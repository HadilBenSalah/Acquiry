<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hadil Ben Salah — Acquiry</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23060a14'/%3E%3Cpolygon points='16,5 27,27 5,27' fill='none' stroke='%23c9a84c' stroke-width='1.4' stroke-linejoin='round'/%3E%3Cline x1='9' y1='22' x2='23' y2='22' stroke='%23c9a84c' stroke-width='1.4' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #060a14;
      --navy2:  #0a1020;
      --gold:   #c9a84c;
      --gold2:  #e2c06a;
      --white:  #ede8dc;
      --muted:  #6e7688;
      --border: rgba(201,168,76,0.18);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      font-family: 'Montserrat', sans-serif;
      color: var(--white);
      overflow-x: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.7;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -20vh; left: 50%;
      transform: translateX(-50%);
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(201,168,76,0.045) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 56px;
      gap: 0;
    }

    /* ── CARD FLIP ── */
    .card-scene {
      width: min(340px, 88vw);
      height: min(220px, 57vw);
      perspective: 1000px;
      margin-bottom: 44px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .card-flipper {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.72s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .card-scene.flipped .card-flipper {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 2px;
      overflow: hidden;
      background: var(--navy);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.55),
        0 24px 64px rgba(0,0,0,0.4),
        inset 0 0 0 1px rgba(201,168,76,0.10);
    }

    .card-back-face {
      transform: rotateY(180deg);
    }

    /* Grain on card */
    .card-face::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 10;
    }

    /* Front face */
    .card-front-face::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 90px; height: 90px;
      background: radial-gradient(circle at top right, rgba(201,168,76,0.08), transparent 70%);
    }

    .front-bl {
      position: absolute; bottom: 0; left: 0;
      width: 70px; height: 70px;
      background: radial-gradient(circle at bottom left, rgba(201,168,76,0.05), transparent 70%);
    }

    .front-vline {
      position: absolute; left: 0; top: 18%; bottom: 18%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.2), transparent);
    }

    .front-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 2;
    }

    .a-mark {
      width: clamp(32px, 9vw, 44px);
      height: clamp(32px, 9vw, 44px);
      margin-bottom: clamp(10px, 3vw, 16px);
    }

    .mark-rule {
      width: 24px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0.5;
      margin-bottom: clamp(10px, 3vw, 16px);
    }

    .wordmark {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: clamp(9px, 2.4vw, 13px);
      letter-spacing: 0.46em;
      color: var(--gold);
      text-transform: uppercase;
      text-indent: 0.46em;
    }

    /* Back face */
    .card-back-face::before {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 90px; height: 90px;
      background: radial-gradient(circle at bottom left, rgba(201,168,76,0.07), transparent 70%);
    }

    .back-tr {
      position: absolute; top: 0; right: 0;
      width: 60px; height: 60px;
      background: radial-gradient(circle at top right, rgba(201,168,76,0.04), transparent 70%);
    }

    .back-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 32px;
      z-index: 2;
    }

    .back-name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: clamp(7px, 2vw, 9px);
      letter-spacing: 0.28em;
      color: var(--white);
      text-transform: uppercase;
      text-indent: 0.28em;
      text-align: center;
      margin-bottom: 4px;
      opacity: 0.88;
    }

    .back-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(5.5px, 1.5vw, 7px);
      letter-spacing: 0.32em;
      color: var(--muted);
      text-transform: uppercase;
      text-indent: 0.32em;
      text-align: center;
    }

    .back-main-sep {
      width: 28px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0.35;
      margin: clamp(10px, 3vw, 14px) 0;
    }

    .back-line {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(6px, 1.7vw, 7.5px);
      letter-spacing: 0.14em;
      color: var(--white);
      text-align: center;
      opacity: 0.72;
    }

    .back-line.hl {
      color: var(--gold); font-weight: 400;
      opacity: 1;
      font-size: clamp(6.5px, 1.8vw, 8px);
      letter-spacing: 0.16em;
    }

    .back-sep {
      width: 12px; height: 1px;
      background: var(--gold); opacity: 0.25;
      margin: clamp(6px, 1.8vw, 9px) 0;
    }

    /* Flip hint */
    .flip-hint {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.6rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 0.7s 1s forwards;
      transition: opacity 0.3s;
    }
    .flip-hint svg {
      width: 12px; height: 12px;
      stroke: var(--gold); fill: none;
      stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
      opacity: 0.6;
    }
    .flip-hint.hidden { opacity: 0 !important; }

    /* ── ACTIONS ── */
    .actions {
      width: min(340px, 88vw);
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.8s 0.85s forwards;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: border-color 0.3s, background 0.3s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .action-btn::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--gold);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .action-btn:hover {
      border-color: rgba(201,168,76,0.35);
      background: rgba(201,168,76,0.04);
      transform: translateX(3px);
    }

    .action-btn:hover::before { transform: scaleY(1); }

    .action-btn.primary {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--navy);
    }
    .action-btn.primary::before { background: rgba(0,0,0,0.15); }
    .action-btn.primary:hover {
      background: var(--gold2);
      border-color: var(--gold2);
      transform: translateX(3px);
    }

    .btn-icon {
      width: 16px; height: 16px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon svg { width: 15px; height: 15px; }

    .btn-label { flex: 1; }

    .btn-arrow {
      opacity: 0.4;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      transition: opacity 0.3s, transform 0.3s;
    }
    .action-btn:hover .btn-arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }
    .action-btn.primary .btn-arrow { opacity: 0.5; }

    /* Divider */
    .actions-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }
    .actions-divider::before,
    .actions-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .actions-divider span {
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.6;
    }

    /* ── FOOTER ── */
    .card-footer {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeUp 0.8s 1.1s forwards;
    }

    .footer-logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 0.38em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.5;
    }

    .footer-site {
      font-size: 0.58rem;
      letter-spacing: 0.16em;
      color: var(--muted);
      opacity: 0.45;
      text-decoration: none;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-scene {
      opacity: 0;
      animation: fadeUp 0.85s 0.15s forwards;
    }

    /* Save contact button pulse */
    @keyframes subtlePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.0); }
      50% { box-shadow: 0 0 0 4px rgba(201,168,76,0.12); }
    }
    .action-btn.primary {
      animation: subtlePulse 3s 2s infinite;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- ── CARD ── -->
    <div class="card-scene" id="cardScene">
      <div class="card-flipper" id="cardFlipper">

        <!-- FRONT -->
        <div class="card-face card-front-face">
          <div class="front-bl"></div>
          <div class="front-vline"></div>
          <div class="front-inner">
            <svg class="a-mark" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="0.5" y="0.5" width="37" height="37" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>
              <polygon points="19,8 32,30 6,30" fill="none" stroke="#c9a84c" stroke-width="1.3" stroke-linejoin="round"/>
              <line x1="11" y1="23.5" x2="27" y2="23.5" stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <div class="mark-rule"></div>
            <div class="wordmark">Acquiry</div>
          </div>
        </div>

        <!-- BACK -->
        <div class="card-face card-back-face">
          <div class="back-tr"></div>
          <div class="back-inner">
            <div class="back-name">Hadil Ben Salah</div>
            <div class="back-title">Fondatrice</div>
            <div class="back-main-sep"></div>
            <div class="back-line hl">contact@acquiry.dev</div>
            <div class="back-sep"></div>
            <div class="back-line">+216 28 257 013</div>
            <div class="back-sep"></div>
            <div class="back-line">acquiry.dev</div>
          </div>
        </div>

      </div>
    </div>

    <!-- Flip hint -->
    <div class="flip-hint" id="flipHint">
      <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Retourner
    </div>

    <!-- ── ACTIONS ── -->
    <div class="actions">

      <!-- Save contact -->
      <a href="data:text/vcard;charset=utf-8,BEGIN:VCARD%0AVERSION:3.0%0AFN:Hadil%20Ben%20Salah%0AORG:Acquiry%0ATITLE:Fondatrice%0ATEL:+21628257013%0AEMAIL:contact%40acquiry.dev%0AURL:https%3A%2F%2Facquiry.dev%0AEND:VCARD"
         download="Hadil-Ben-Salah.vcf"
         class="action-btn primary">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span class="btn-label">Enregistrer le contact</span>
        <span class="btn-arrow">→</span>
      </a>

      <div class="actions-divider"><span>ou</span></div>

      <!-- WhatsApp -->
      <a href="https://wa.me/21628257013" target="_blank" class="action-btn">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" style="opacity:0.75">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </div>
        <span class="btn-label">WhatsApp</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Email -->
      <a href="mailto:contact@acquiry.dev" class="action-btn">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.75">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <span class="btn-label">contact@acquiry.dev</span>
        <span class="btn-arrow">→</span>
      </a>

      <!-- Website -->
      <a href="https://acquiry.dev" target="_blank" class="action-btn">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.75">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <span class="btn-label">acquiry.dev</span>
        <span class="btn-arrow">→</span>
      </a>

    </div>

    <!-- Footer -->
    <div class="card-footer">
      <span class="footer-logo">Acquiry</span>
      <a href="https://acquiry.dev" class="footer-site">acquiry.dev</a>
    </div>

  </div>

  <script>
    const scene = document.getElementById('cardScene');
    const hint  = document.getElementById('flipHint');
    let flipped = false;

    scene.addEventListener('click', () => {
      flipped = !flipped;
      scene.classList.toggle('flipped', flipped);
      hint.classList.add('hidden');
    });

    // Touch swipe support
    let startX = 0;
    scene.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    scene.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - startX;
      if (Math.abs(diff) > 30) {
        flipped = !flipped;
        scene.classList.toggle('flipped', flipped);
        hint.classList.add('hidden');
      }
    }, { passive: true });
  </script>
</body>
</html>
